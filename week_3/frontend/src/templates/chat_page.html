<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- bootstrap css -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <!-- custom css -->
        <link rel="stylesheet" href="../styles/style.css">

        <!-- google font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <title>{{name}} Chatbot</title>
        <link rel="icon" type="image/svg+xml" href="/assets/small-glob.svg">
    </head>
    <body>
        <div class="d-flex flex-column justify-content-between full-height">
            <!-- header -->
             <div class="d-flex justify-content-center mt-3">
                <span style="font-family: 'Raleway', sans-serif;">{{name}}</span>
             </div>

            <div id="scrollable-container" class="scroll-ctn container d-flex flex-column align-items-center gap-5 h-75 overflow-auto">
                <!-- welcome text -->
                <div id="welcome-text" class="d-flex flex-column align-items-center my-auto">
                    <img src="../assets/small-glob.svg" alt="asset glob" width="150">
                    <h1 class="fs-2 text-gradient">Hello</h1>
                    <h1 class="fs-2 text-center">How can I assist you today?</h1>
                </div>

                <!-- chat history -->
                 <div id="chat-history" style="width: 100%;" class="d-flex flex-column gap-3 py-4 d-none"></div>

                 <!-- loading indicator -->
                <div id="loading-bubble" class="d-flex justify-content-start d-none">
                    <div class="px-3 py-2 rounded-3" style="background-color: rgba(255,255,255,0.05);">
                        <span class="loading-dots">
                            <span>.</span><span>.</span><span>.</span>
                        </span>
                    </div>
                </div>

            </div>
            
            <div class="container mb-4">
                <!-- attached file preview -->
                <div id="file-preview" class="d-none mb-2 d-flex flex-wrap gap-2"></div>

                <div id="chat-field" class="input-field border">
                    <label class="icon pointer border">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20" height="20">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 8.25H7.5a2.25 2.25 0 0 0-2.25 2.25v9a2.25 2.25 0 0 0 2.25 2.25h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25H15m0-3-3-3m0 0-3 3m3-3V15" />
                        </svg>
                        <input id="file-input" type="file" class="d-none">
                    </label>

                    <textarea id="chat-input" rows="1" class="form-control border-0 shadow-none bg-transparent text-light flex-grow-1" placeholder="Ask me anything..."></textarea>

                    <button id="send-btn" class="btn btn-primary btn-sm px-3 d-none" onclick="sendMessage()">
                        Send
                    </button>
                </div>
            </div>

            <!-- footer -->
            <footer class="d-flex justify-content-center mb-4"><small class="text-center text-secondary">i can make mistakes. verify answers before using them.</small></footer>
        </div>

        <!-- PDF.js -->
        <script type="module">
            import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';
            window.pdfjsLib = pdfjsLib; // expose to global scope so other scripts can use it
        </script>

        <!-- main script -->
        <script>
            const BACKEND_URL = "{{ backend_url }}"
            const input = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            const fileInput = document.getElementById('file-input')
            const filePreview = document.getElementById('file-preview')
            const chatHistory = document.getElementById('chat-history')
            const welcomeText = document.getElementById('welcome-text')
            const loadingBubble = document.getElementById('loading-bubble');

            let attachedFiles = []

            // ------------------ send btn actions ------------------
            input.addEventListener('focus', ()=> {
                // when focused, if got user input OR got files attached, show send btn
                if (input.value.trim() !== '' || attachedFiles.length > 0) {
                    sendBtn.classList.remove('d-none')
                }
            })

            input.addEventListener('blur', () => {
                // when unfocused, if no input AND no files, hide send btn
                if (input.value.trim() === '' && attachedFiles.length === 0) {
                    sendBtn.classList.add('d-none');
                }
            });

            input.addEventListener('input', () => {
                input.style.height = 'auto'
                input.style.height = input.scrollHeight + 'px'
                sendBtn.disabled = input.value.trim() === '' && attachedFiles.length === 0

                if (input.value.trim() !== '') {
                    // if got user input, show send btn
                    sendBtn.classList.remove('d-none');
                } else if (attachedFiles.length === 0) {
                    // if no files attached, hide btn
                    sendBtn.classList.add('d-none')
                }
            });

            // ------------------ form submit actions ------------------
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault()
                    if (!sendBtn.disabled) sendMessage()
                }
            })

            // ------------------ file upload actions ------------------
            fileInput.addEventListener('change', () => {
                const file = fileInput.files[0]
                if(!file) return

                attachedFiles.push(file)
                renderFilePreview()
                sendBtn.classList.remove('d-none')
                sendBtn.disabled = false

                fileInput.value = ''
            })

            function renderFilePreview() {
                filePreview.innerHTML = ''
                if (attachedFiles.length === 0) {
                    filePreview.classList.add('d-none')
                    return
                }

                filePreview.classList.remove('d-none')
                attachedFiles.forEach((file, index) => {
                    const tag = document.createElement('div')
                    tag.className = 'd-flex align-items-center gap-2 p-2 rounded text-light'
                    tag.style.backgroundColor = 'rgba(222, 182, 255, 0.15)'
                    tag.style.fontSize = '0.8rem'
                    tag.innerHTML = `
                        <span>📄 ${file.name}</span>
                        <span style="cursor:pointer; opacity:0.6;" onclick="removeFile(${index})">✕</span>
                    `
                    filePreview.appendChild(tag)
                })
            }

            function removeFile(index) {
                attachedFiles.splice(index, 1)
                renderFilePreview()
                if (attachedFiles.length === 0 && input.value.trim() === ''){
                    sendBtn.classList.add('d-none')
                }
            }

            // ------------------ send message actions ------------------
            async function sendMessage() {
                const message = input.value.trim()
                if (!message && attachedFiles.length === 0) return

                // hide welcome text after first message
                welcomeText.classList.add('d-none')
                chatHistory.classList.remove('d-none')

                // show user message in chat
                appendMessage('user', message, attachedFiles.map(f => f.name))

                 // extract file text before sending
                let fileText = '';
                if (attachedFiles.length > 0) {
                    fileText = await extractFileText(attachedFiles[0]);
                }

                // reset input
                input.value = ''
                input.style.height = 'auto'
                attachedFiles = []
                renderFilePreview()
                sendBtn.classList.add('d-none')
                sendBtn.disabled = true

                // show loading indicator
                loadingBubble.classList.remove('d-none')
                loadingBubble.scrollIntoView({ behavior: 'smooth' })

                // send to backend
                try {
                    const response = await fetch(`${BACKEND_URL}/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: message,
                            file_text: fileText
                        })
                    });
                    const data = await response.json();

                    let reply = ''
                    if (!data.reply) {
                        // no response from server
                        reply = 'Error generating response. Try again.'
                    } else {
                        reply = data.reply
                    }
                    appendMessage('assistant', reply);
                } catch (error) {
                    console.error("[Fetch Error]", error)
                    console.error('BACKEND_URL was:', BACKEND_URL);
                    appendMessage('assistant', `Error: ${error.message}`);
                } finally {
                    // hide loading whether success or error
                    loadingBubble.classList.add('d-none')
                }
            }

            // --------- render chat bubbles (user/assistant) ---------
            function appendMessage(role, text, fileNames = []) {
                const wrapper = document.createElement('div');
                wrapper.id = 'wrapper'
                wrapper.className = `d-flex ${role === 'user' ? 'justify-content-end' : 'justify-content-start'}`;

                const bubble = document.createElement('div');
                bubble.id = 'bubble'
                bubble.className = 'px-3 py-2 rounded-3 text-light';
                bubble.style.maxWidth = '75%';
                bubble.style.backgroundColor = role === 'user' ? 'rgba(222, 182, 255, 0.25)' : 'rgba(255,255,255,0.1)';

                // show attached filenames above message
                if (fileNames.length > 0) {
                    fileNames.forEach(name => {
                        const tag = document.createElement('div');
                        tag.style.fontSize = '0.75rem';
                        tag.style.opacity = '0.6';
                        tag.textContent = `📄 ${name}`;
                        bubble.appendChild(tag);
                    });
                }

                const textEl = document.createElement('p');
                textEl.className = 'm-0';
                textEl.innerHTML = text.replace(/\n/g, '<br>');
                bubble.appendChild(textEl);
                wrapper.appendChild(bubble);
                chatHistory.appendChild(wrapper);

                // scroll to latest message
                wrapper.scrollIntoView({ behavior: 'smooth' });
            }

            // --------- handle file text extraction ---------
            async function extractFileText(file) {
                if (!file.name.endsWith('.pdf')) {
                    // for .txt or .docx just read as text
                    return await readFileAsText(file)
                }

                const arrayBuffer = await file.arrayBuffer()
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise
                let fullText = ''

                for (let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i)
                    const content = await page.getTextContent()
                    const pageText = content.items.map(item => item.str).join(' ')
                    fullText += pageText + '\n'
                }

                return fullText
            }

            function readFileAsText(file) {
                return new Promise((resolve) => {
                    const reader = new FileReader()
                    reader.onload = (e) => resolve(e.target.result)
                    reader.onerror = () => resolve('')
                    reader.readAsText(file)
                })
            }
        </script>

        <!-- bootstrap -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
