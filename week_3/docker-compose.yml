networks:
  week3-network:
    driver: bridge

services:
  frontend:
    image: frontend
    pull_policy: build
    build:
      context: frontend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - week3-network

  backend:
    image: backend
    pull_policy: build
    build:
      context: backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    networks:
      - week3-network
